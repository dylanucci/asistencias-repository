<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de Asistencia</title>
    <script defer src="resumen.js"></script>
    <link rel="stylesheet" href="resumen.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <img src="../Authentication/escudonashei.png" alt="Escudo institucional" class="navbar-logo">
            <div class="navbar-titulo-container">
                <h1 class="navbar-titulo">Sistema de Asistencia</h1>
            </div>
            <img src="../Authentication/escudonashei.png" alt="Escudo institucional" class="navbar-logo">
        </div>
    </nav>

    <main class="page-wrapper">
        <section class="resume-panel">
            <div class="panel-header">
                <div>
                    <p class="eyebrow">Resumen final</p>
                    <h2 id="page_title">Resumen de Asistencia</h2>
                    <p id="page_subtitle" class="panel-description">
                        Aquí está el resumen de asistencia del día seleccionado.
                    </p>
                </div>

                <div class="header-actions">
                    <span id="date_display" class="date-display"></span>
                    <button id="back_button" type="button" class="secondary-btn">← Volver a marcar</button>
                </div>
            </div>

            <div class="summary-grid">
                <div class="summary-card total">
                    <span>Total</span>
                    <strong id="count_total">0</strong>
                </div>
                <div class="summary-card present">
                    <span>Presentes</span>
                    <strong id="count_present">0</strong>
                </div>
                <div class="summary-card absent">
                    <span>Ausentes</span>
                    <strong id="count_absent">0</strong>
                </div>
            </div>

            <div class="resume-grid">
                <section class="card-panel present-section">
                    <h3 class="section-title present">✓ Presentes</h3>
                    <div id="present_list" class="student-resume-list"></div>
                </section>

                <section class="card-panel absent-section">
                    <h3 class="section-title absent">✗ Ausentes</h3>
                    <div id="absent_list" class="student-resume-list"></div>
                </section>
            </div>

            <div class="footer-actions">
                <button id="back_to_attendance" type="button" class="secondary-btn">← Volver a marcar</button>
                <button id="finish_button" type="button" class="primary-btn">Finalizar y volver al curso →</button>
            </div>
        </section>
    </main>
</body>
</html>
