<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso</title>
    <script src="curso.js" defer></script>
    <link rel="stylesheet" href="curso.css">
</head>
<body>
    <!--
        Pantalla de acciones del curso.
        Qué hay acá: accesos rápidos para alumnos, diseño del aula, visualización y asistencia.
        Qué se puede cambiar: nombres de botones, subtítulos y orden de las tarjetas.
        Qué hace: centraliza las opciones disponibles para el curso seleccionado.
    -->
    <nav class="navbar">
        <div class="navbar-content">
            <img src="../Authentication/escudonashei.png" alt="Escudo institucional" class="navbar-logo">
            <div class="navbar-titulo-container">
                <h1 class="navbar-titulo">Sistema de Asistencia</h1>
            </div>
            <img src="../Authentication/escudonashei.png" alt="Escudo institucional" class="navbar-logo">
        </div>
    </nav>

    <main class="page-wrapper">
        <section class="course-panel">
            <p class="eyebrow">Gestión de curso</p>
            <h2 id="curso_title">Curso</h2>
            <p id="curso_subtitle" class="course-subtitle">Elegí una acción para continuar.</p>

            <div class="actions-grid">
                <button id="add_alumnos_button" class="action-card" type="button">
                    <span class="action-title">Agregar alumnos</span>
                    <span class="action-text">Cargá estudiantes al curso actual.</span>
                </button>

                <button id="add_diseño_button" class="action-card" type="button">
                    <span class="action-title">Generar diseño</span>
                    <span class="action-text">Creá la distribución de bancos y asientos.</span>
                </button>

                <button id="view_diseño_button" class="action-card" type="button">
                    <span class="action-title">Visualizar diseño</span>
                    <span class="action-text">Ubicá alumnos dentro del aula.</span>
                </button>

                <button id="asistencia_button" class="action-card" type="button">
                    <span class="action-title">Tomar asistencia</span>
                    <span class="action-text">Accedé al registro diario del curso.</span>
                </button>
            </div>

            <button id="back_to_home_button" class="back-button" type="button">← Volver al panel principal</button>
        </section>
    </main>
</body>
</html>
